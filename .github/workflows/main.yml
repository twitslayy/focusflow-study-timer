name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: npm install

      - run: npm install -g expo-cli eas-cli

      - name: Set Expo Token
        run: echo "EXPO_TOKEN=${{ secrets.EXPO_TOKEN }}" >> $GITHUB_ENV

      - name: Ensure EAS config
        run: |
          if [ ! -f eas.json ]; then
            eas build:configure --platform android --non-interactive
          fi

      - name: Skip fingerprint
        run: echo "EAS_SKIP_AUTO_FINGERPRINT=1" >> $GITHUB_ENV

      - name: Build APK
        run: eas build -p android --profile preview --non-interactive
