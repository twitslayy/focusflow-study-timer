name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Install Expo & EAS
        run: npm install -g expo-cli eas-cli

      - name: Login to Expo
        run: npx expo login -u ${{ secrets.EXPO_USERNAME }} -p ${{ secrets.EXPO_PASSWORD }}

      - name: Fix EAS fingerprint issue
        run: echo "EAS_SKIP_AUTO_FINGERPRINT=1" >> $GITHUB_ENV

      - name: Initialize EAS (if needed)
        run: |
          if [ ! -f eas.json ]; then
            eas build:configure --platform android
          fi

      - name: Build APK
        run: eas build -p android --profile preview --non-interactive
